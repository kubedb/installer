{{- if eq "true" ( include "security.useCiliumNetworkPolicy" . ) }}
# Allow provisioner pods to reach external registries.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-egress-world
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kubedb-provisioner
  egress:
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
---
# Allow the provisioner pods to reach database pods (any kubedb-managed
# namespace, on the standard DB ports).
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: {{ .Release.Name }}-egress-to-databases
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kubedb-provisioner
      k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
  egress:
  - toEndpoints:
    - matchLabels:
        app.kubernetes.io/component: database
        app.kubernetes.io/managed-by: kubedb.com
    toPorts:
    - ports:
      # PostgreSQL
      - port: "5432"
        protocol: TCP
      # MongoDB
      - port: "27017"
        protocol: TCP
      # MySQL / MariaDB
      - port: "3306"
        protocol: TCP
      # Redis
      - port: "6379"
        protocol: TCP
      # Elasticsearch / OpenSearch
      - port: "9200"
        protocol: TCP
      # Kafka
      - port: "9092"
        protocol: TCP
      # ClickHouse
      - port: "9000"
        protocol: TCP
      # Cassandra
      - port: "9042"
        protocol: TCP
{{- end }}
