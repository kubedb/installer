{{- if and (eq "prometheus.io/operator" ( include "monitoring.agent" . )) .Values.monitoring.serviceMonitor.bearerTokenSecret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-metrics-token" (include "kubedb-provider-azure.fullname" .)) .Values.monitoring.serviceMonitor.bearerTokenSecret.name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/service-account.name: {{ include "kubedb-provider-azure.serviceAccountName" . }}
  labels:
    {{- include "kubedb-provider-azure.labels" . | nindent 4 }}
type: kubernetes.io/service-account-token
{{- end }}
