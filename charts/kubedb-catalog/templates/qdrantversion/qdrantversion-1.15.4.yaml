{{ $featureGates := .Values.featureGates }}
{{- if .Values.global }}
  {{ $featureGates = mergeOverwrite dict .Values.featureGates .Values.global.featureGates }}
{{- end }}

{{ if $featureGates.Qdrantversion }}

apiVersion: catalog.kubedb.com/v1alpha1
kind: Qdrantversion
metadata:
  name: '1.15.4'
  labels:
    {{- include "kubedb-catalog.labels" . | nindent 4 }}
spec:
  db:
    image: '{{ include "image.dockerHub" (merge (dict "_repo" "qdrant/qdrant") $) }}:v1.15.4'
  version: 1.15.4

---

apiVersion: catalog.kubedb.com/v1alpha1
kind: Qdrantversion
metadata:
  name: '1.15.4'
  labels:
    {{- include "kubedb-catalog.labels" . | nindent 4 }}
spec:
  db:
    image: '{{ include "image.dockerHub" (merge (dict "_repo" "qdrant/qdrant") $) }}:v1.15.4-unprivileged'
  version: 1.15.4
{{ end }}
