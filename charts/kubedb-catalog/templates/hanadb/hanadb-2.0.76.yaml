{{- template "kubedb-catalog.refresh-versions" . }}

{{ $featureGates := .Values.featureGates }}
{{ $ubi := .Values.distro.ubi }}
{{- if .Values.global }}
  {{ $featureGates = mergeOverwrite dict .Values.featureGates .Values.global.featureGates }}
  {{ $ubi = default .Values.distro.ubi .Values.global.distro.ubi }}
{{- end }}

{{ if and $featureGates.HanaDB (not (eq $ubi "operator")) }}


apiVersion: catalog.kubedb.com/v1alpha1
kind: HanaDBVersion
metadata:
  name: '2.0.76'
  labels:
    {{- include "kubedb-catalog.labels" . | nindent 4 }}
spec:
  coordinator:
    image: '{{ include "image.ghcr" (merge (dict "_repo" "kubedb/hanadb-coordinator") $) }}:v0.3.0{{ include "catalog.ubi" $ }}'
  db:
    image: '{{ include "image.dockerHub" (merge (dict "_repo" "saplabs/hanaexpress") $) }}:2.00.076.00.20240701.1'
  securityContext:
    runAsGroup: 79
    runAsUser: 12000
  updateConstraints:
    allowlist:
    - '>=2.0.76, <= 2.0.88'
  version: 2.0.76
{{ end }}
