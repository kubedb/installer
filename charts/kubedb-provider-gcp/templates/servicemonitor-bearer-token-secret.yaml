{{- $tokenSecretName := printf "%s-metrics-token" (include "kubedb-provider-gcp.fullname" .) -}}
{{- if and (eq "prometheus.io/operator" ( include "monitoring.agent" . )) (not (lookup "v1" "Secret" .Release.Namespace $tokenSecretName)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tokenSecretName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/service-account.name: {{ include "kubedb-provider-gcp.serviceAccountName" . }}
  labels:
    {{- include "kubedb-provider-gcp.labels" . | nindent 4 }}
type: kubernetes.io/service-account-token
{{- end }}
