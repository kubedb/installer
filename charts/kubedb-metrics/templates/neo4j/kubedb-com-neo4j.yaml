{{ $featureGates := .Values.featureGates }}
{{- if .Values.global }}
  {{ $featureGates = mergeOverwrite dict .Values.featureGates .Values.global.featureGates }}
{{- end }}

{{ if $featureGates.Neo4j }}

apiVersion: metrics.appscode.com/v1alpha1
kind: MetricsConfiguration
metadata:
  name: kubedb-com-neo4j
spec:
  targetRef:
    apiVersion: kubedb.com/v1alpha2
    kind: Neo4j
  commonLabels:
    - key: app
      valuePath: .metadata.name
    - key: app_namespace
      valuePath: .metadata.namespace
  metrics:
    - name: created
      help: "Unix creation time stamp"
      type: gauge
      field:
        path: .metadata.creationTimestamp
        type: DateTime
      metricValue:
        valueFromPath: .metadata.creationTimestamp

    - name: info
      help: "Kubedb neo4j information"
      type: gauge
      labels:
        - key: version
          valuePath: .spec.version
        - key: storageType
          valuePath: .spec.storageType
        - key: deletionPolicy
          valuePath: .spec.deletionPolicy
        - key: storageClassName
          valuePath: .spec.storage.storageClassName
      metricValue:
        value: 1

    - name: replicas
      help: "Number of neo4j replicas in general mode"
      type: gauge
      params:
        - key: obj
          valuePath: .
      metricValue:
        valueFromExpression: resource_replicas(obj)

    - name: status_conditions
      help: "Neo4j instance status condition"
      type: gauge
      field:
        path: .status.conditions
        type: Array
      labels:
        - key: type
          valuePath: .status.conditions[*].type
        - key: status
          valuePath: .status.conditions[*].status
      metricValue:
        value: 1

    - name: status_phase
      help: "Neo4j instance current phase"
      type: gauge
      field:
        path: .status.phase
        type: String
      params:
        - key: phase
          valuePath: .status.phase
      states:
        labelKey: phase
        values:
          - labelValue: Ready
            metricValue:
              valueFromExpression: "int(phase == 'Ready')"
          - labelValue: Halted
            metricValue:
              valueFromExpression: "int(phase == 'Halted')"
          - labelValue: Provisioning
            metricValue:
              valueFromExpression: "int(phase == 'Provisioning')"
          - labelValue: Critical
            metricValue:
              valueFromExpression: "int(phase == 'Critical')"
          - labelValue: NotReady
            metricValue:
              valueFromExpression: "int(phase == 'NotReady')"
          - labelValue: DataRestoring
            metricValue:
              valueFromExpression: "int(phase == 'DataRestoring')"

    - name: tls_enabled
      help: "Neo4j TLS enabled (1 when an issuerRef is configured, else 0)"
      type: gauge
      labels:
        - key: issuers_name
          valuePath: .spec.tls.issuerRef.name
      params:
        - key: issuer
          valuePath: .spec.tls.issuerRef.name
        - key: bolt
          valuePath: .spec.tls.bolt.mode
        - key: http
          valuePath: .spec.tls.http.mode
        - key: cluster
          valuePath: .spec.tls.cluster.mode
        - key: backup
          valuePath: .spec.tls.backup.mode
      metricValue:
        valueFromExpression: "int(bolt == 'TLS' || bolt == 'mTLS' || http == 'TLS' || http == 'mTLS' || cluster == 'TLS' || cluster == 'mTLS' || backup == 'TLS' || backup == 'mTLS')"

    - name: tls_bolt_mode
      help: "Neo4j bolt TLS (1 when TLS/mTLS with an issuer, else 0). Label `mode` shows the configured mode."
      type: gauge
      labels:
        - key: mode
          valuePath: .spec.tls.bolt.mode
      params:
        - key: issuer
          valuePath: .spec.tls.issuerRef.name
        - key: mode
          valuePath: .spec.tls.bolt.mode
      metricValue:
        valueFromExpression: "int(issuer != '' && (mode == 'TLS' || mode == 'mTLS'))"

    - name: tls_http_mode
      help: "Neo4j http TLS (1 when TLS/mTLS with an issuer, else 0). Label `mode` shows the configured mode."
      type: gauge
      labels:
        - key: mode
          valuePath: .spec.tls.http.mode
      params:
        - key: issuer
          valuePath: .spec.tls.issuerRef.name
        - key: mode
          valuePath: .spec.tls.http.mode
      metricValue:
        valueFromExpression: "int(issuer != '' && (mode == 'TLS' || mode == 'mTLS'))"

    - name: tls_cluster_mode
      help: "Neo4j cluster TLS (1 when TLS/mTLS with an issuer, else 0). Label `mode` shows the configured mode."
      type: gauge
      labels:
        - key: mode
          valuePath: .spec.tls.cluster.mode
      params:
        - key: issuer
          valuePath: .spec.tls.issuerRef.name
        - key: mode
          valuePath: .spec.tls.cluster.mode
      metricValue:
        valueFromExpression: "int(issuer != '' && (mode == 'TLS' || mode == 'mTLS'))"

    - name: tls_backup_mode
      help: "Neo4j backup TLS (1 when TLS/mTLS with an issuer, else 0). Label `mode` shows the configured mode."
      type: gauge
      labels:
        - key: mode
          valuePath: .spec.tls.backup.mode
      params:
        - key: issuer
          valuePath: .spec.tls.issuerRef.name
        - key: mode
          valuePath: .spec.tls.backup.mode
      metricValue:
        valueFromExpression: "int(issuer != '' && (mode == 'TLS' || mode == 'mTLS'))"

    - name: resource_request_cpu
      help: "Requested CPU by Neo4j in core"
      type: gauge
      labels:
        - key: unit
          value: core
      params:
        - key: obj
          valuePath: .
        - key: resourceType
          value: cpu
      metricValue:
        valueFromExpression: total_resource_requests(obj, resourceType)

    - name: resource_request_memory
      help: "Requested memory by Neo4j in byte"
      type: gauge
      labels:
        - key: unit
          value: byte
      params:
        - key: obj
          valuePath: .
        - key: resourceType
          value: memory
      metricValue:
        valueFromExpression: total_resource_requests(obj, resourceType)

    - name: resource_request_storage
      help: "Requested storage by Neo4j in byte"
      type: gauge
      labels:
        - key: unit
          value: byte
      params:
        - key: obj
          valuePath: .
        - key: resourceType
          value: storage
      metricValue:
        valueFromExpression: total_resource_requests(obj, resourceType)

    - name: resource_limit_cpu
      help: "CPU limit for Neo4j in core"
      type: gauge
      labels:
        - key: unit
          value: core
      params:
        - key: obj
          valuePath: .
        - key: resourceType
          value: cpu
      metricValue:
        valueFromExpression: total_resource_limits(obj, resourceType)

    - name: resource_limit_memory
      help: "Memory limit for Neo4j in byte"
      type: gauge
      labels:
        - key: unit
          value: byte
      params:
        - key: obj
          valuePath: .
        - key: resourceType
          value: memory
      metricValue:
        valueFromExpression: total_resource_limits(obj, resourceType)

    - name: resource_limit_storage
      help: "Storage limit for Neo4j in byte"
      type: gauge
      labels:
        - key: unit
          value: byte
      params:
        - key: obj
          valuePath: .
        - key: resourceType
          value: storage
      metricValue:
        valueFromExpression: total_resource_limits(obj, resourceType)

{{ end }}
