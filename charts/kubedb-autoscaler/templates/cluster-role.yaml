apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubedb-autoscaler.fullname" . }}
  labels:
    {{- include "kubedb-autoscaler.labels" . | nindent 4 }}
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs: ["*"]
- apiGroups:
  - operator.k8s.appscode.com
  resources:
  - shardconfigurations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kubedb.com
  - catalog.kubedb.com
  - ops.kubedb.com
  - autoscaling.kubedb.com
  resources:
  - "*"
  verbs: ["*"]
- apiGroups:
  - autoscaling.kubedb.com
  resources:
  - aerospikeautoscalers/finalizers
  - cassandraautoscalers/finalizers
  - clickhouseautoscalers/finalizers
  - db2autoscalers/finalizers
  - documentdbautoscalers/finalizers
  - druidautoscalers/finalizers
  - elasticsearchautoscalers/finalizers
  - etcdautoscalers/finalizers
  - hanadbautoscalers/finalizers
  - hazelcastautoscalers/finalizers
  - igniteautoscalers/finalizers
  - kafkaautoscalers/finalizers
  - mariadbautoscalers/finalizers
  - memcachedautoscalers/finalizers
  - milvusautoscalers/finalizers
  - mongodbautoscalers/finalizers
  - mssqlserverautoscalers/finalizers
  - mysqlautoscalers/finalizers
  - neo4jautoscalers/finalizers
  - oracleautoscalers/finalizers
  - perconaxtradbautoscalers/finalizers
  - pgbouncerautoscalers/finalizers
  - pgpoolautoscalers/finalizers
  - postgresautoscalers/finalizers
  - proxysqlautoscalers/finalizers
  - qdrantautoscalers/finalizers
  - rabbitmqautoscalers/finalizers
  - redisautoscalers/finalizers
  - redissentinelautoscalers/finalizers
  - singlestoreautoscalers/finalizers
  - solrautoscalers/finalizers
  - weaviateautoscalers/finalizers
  - zookeeperautoscalers/finalizers
  verbs: ["update"]
- apiGroups:
  - apps
  resources:
  - statefulsets/finalizers
  verbs: ["update"]
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs: ["get", "list", "watch"]
- apiGroups:
  - apps.k8s.appscode.com
  resources:
  - petsets
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - namespaces
  - services
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - secrets
  - configmaps
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - pods
  verbs: ["*"]
- apiGroups:
  - ""
  resources:
  - replicationcontrollers
  verbs: ["get", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - nodes
  - limitranges
  - persistentvolumeclaims
  verbs: ["get", "list", "watch", "patch"]
- apiGroups:
  - ""
  resources:
  - events
  verbs: ["get", "list", "watch", "create"]
- apiGroups:
  - "metrics.k8s.io"
  resources:
  - pods
  verbs: ["get", "list", "watch"]
- apiGroups:
  - "custom.metrics.k8s.io"
  resources:
  - pods
  - persistentvolumeclaims/volume_used_percentage
  - persistentvolumeclaims/volume_capacity_bytes
  verbs: ["get", "list", "watch"]
- apiGroups:
  - "node.k8s.appscode.com"
  resources:
  - nodetopologies
  verbs: ["get", "list", "watch"]
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs: ["get", "list", "watch"]
- apiGroups:
  - cluster.open-cluster-management.io
  resources:
  - clusterclaims
  verbs: ["get"]
  resourceNames: ["features.ace.info"]
