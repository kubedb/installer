apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubedb-ops-manager.fullname" . }}
  labels:
    {{- include "kubedb-ops-manager.labels" . | nindent 4 }}
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs: ["*"]
- apiGroups:
  - operator.k8s.appscode.com
  resources:
  - shardconfigurations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - appcatalog.appscode.com
  resources:
  - "*"
  verbs: ["*"]
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs: ["create", "delete", "get", "list", "watch", "patch", "update", "deletecollection"]
- apiGroups:
    - apps.k8s.appscode.com
  resources:
    - petsets
  verbs: ["create", "delete", "get", "list", "watch", "patch", "update", "deletecollection"]
- apiGroups:
  - ""
  resources:
  - events
  verbs: ["create"]
- apiGroups:
  - ""
  resources:
  - nodes
  verbs: ["get", "list", "watch"]
- apiGroups:
  - kubedb.com
  - archiver.kubedb.com
  - catalog.kubedb.com
  - ops.kubedb.com
  - postgres.kubedb.com
  - kafka.kubedb.com
  - storage.kubestash.com
  resources:
  - "*"
  verbs: ["*"]
- apiGroups:
  - ops.kubedb.com
  resources:
  - aerospikeopsrequests/finalizers
  - cassandraopsrequests/finalizers
  - clickhouseopsrequests/finalizers
  - db2opsrequests/finalizers
  - documentdbopsrequests/finalizers
  - druidopsrequests/finalizers
  - elasticsearchopsrequests/finalizers
  - etcdopsrequests/finalizers
  - hanadbopsrequests/finalizers
  - hazelcastopsrequests/finalizers
  - igniteopsrequests/finalizers
  - kafkaopsrequests/finalizers
  - mariadbopsrequests/finalizers
  - memcachedopsrequests/finalizers
  - milvusopsrequests/finalizers
  - mongodbopsrequests/finalizers
  - mssqlserveropsrequests/finalizers
  - mysqlopsrequests/finalizers
  - neo4jopsrequests/finalizers
  - oracleopsrequests/finalizers
  - perconaxtradbopsrequests/finalizers
  - pgbounceropsrequests/finalizers
  - pgpoolopsrequests/finalizers
  - postgresopsrequests/finalizers
  - proxysqlopsrequests/finalizers
  - qdrantopsrequests/finalizers
  - rabbitmqopsrequests/finalizers
  - redisopsrequests/finalizers
  - redissentinelopsrequests/finalizers
  - singlestoreopsrequests/finalizers
  - solropsrequests/finalizers
  - weaviateopsrequests/finalizers
  - zookeeperopsrequests/finalizers
  verbs: ["update"]
- apiGroups:
  - postgres.kubedb.com
  resources:
  - publishers/finalizers
  - subscribers/finalizers
  verbs: ["update"]
- apiGroups:
  - apps
  resources:
  - statefulsets/finalizers
  verbs: ["update"]
- apiGroups:
  - cert-manager.io
  resources:
  - "*"
  verbs: ["*"]
- apiGroups:
  - ""
  resources:
  - pods
  - pods/exec
  - pods/eviction
  - pods/resize
  verbs: ["*"]
- apiGroups:
  - ""
  resources:
  - services
  - secrets
  verbs: ["create", "delete", "get", "patch", "list", "watch"]
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs: ["create", "delete", "get", "list", "watch", "update", "patch"]
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  verbs: ["get", "list", "patch", "delete"]
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs: ["get", "list", "create", "delete", "patch", "deletecollection"]
- apiGroups:
  - batch
  resources:
  - jobs
  verbs: ["create", "delete", "get", "list", "watch"]
- apiGroups:
  - stash.appscode.com
  resources:
  - backupsessions
  - backupconfigurations
  - restoresessions
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups:
    - core.kubestash.com
  resources:
    - backupsessions
    - backupconfigurations
    - restoresessions
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups:
  - ""
  resources:
  - serviceaccounts
  verbs: ["create", "delete", "get", "patch", "deletecollection"]
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - rolebindings
  - roles
  verbs: ["create", "delete", "get", "patch", "deletecollection"]
- apiGroups:
    - apps.k8s.appscode.com
  resources:
    - sidekicks
  verbs:
    - get
    - list
    - create
    - delete
    - patch
    - deletecollection
- apiGroups:
    - core.kubestash.com
  resources:
    - backupsessions
    - backupconfigurations
  verbs:
    - get
    - list
    - watch
- apiGroups:
  - monitoring.coreos.com
  resources:
  - servicemonitors
  verbs: ["*"]
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs: ["get", "list", "watch"]
- apiGroups:
  - cluster.open-cluster-management.io
  resources:
  - clusterclaims
  verbs: ["get"]
  resourceNames: ["features.ace.info"]
- apiGroups:
  - supervisor.appscode.com
  resources: ["*"]
  verbs: ["create", "get", "list", "watch", "update", "patch"]
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - clusterroles
  - clusterrolebindings
  verbs: [ "get","create","patch","delete" ]
- apiGroups:
  - policy
  resources:
  - podsecuritypolicies
  verbs: [ "use" ]
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims
  verbs: [ "create", "delete", "get", "list", "patch", "watch" ]
- apiGroups:
    - ""
  resources:
    - persistentvolumes
  verbs: [ "create", "delete", "get", "list", "patch", "watch" ]
- apiGroups:
  - scanner.appscode.com
  resources:
  - imagescanrequests
  verbs: [ "create", "get", "list", "watch" ]
- apiGroups:
  - scanner.appscode.com
  resources:
  - imagescanreports
  verbs: [ "get", "list", "watch" ]
- apiGroups:
  - ui.kubedb.com
  resources:
    - '*'
  verbs: [ "get", "list", "watch" ]
- apiGroups:
  - cacerts.csi.cert-manager.io
  resources:
  - caproviderclasses
  verbs: [ "get", "list", "watch", "create" ]
- apiGroups:
    - work.open-cluster-management.io
  resources:
    - manifestworks
  verbs:
    - get
    - create
    - list
    - watch
    - patch
    - delete
- apiGroups:
    - apps.k8s.appscode.com
  resources:
    - placementpolicies
  verbs:
    - get
    - list
    - watch
- apiGroups:
    - virtual-secrets.dev
  resources:
    - secrets
    - secrets/mount
  verbs: [ "get","create", "list","watch", "update", "patch"]