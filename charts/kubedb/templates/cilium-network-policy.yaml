{{- if eq "true" ( include "security.useCiliumNetworkPolicy" . ) }}
# Allow every pod in the operator namespace to reach the Kubernetes API server.
# Required when the operator runs with >1 replica (leader election against
# kube-apiserver) or when DBs are reconciled across namespaces.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-egress-kubernetes-api
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector: {}
  egress:
  - toEntities:
    - remote-node
    - host
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
---
# Allow the operator pods to reach the database pods (any kubedb-managed
# namespace, on the standard DB ports).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-egress-to-databases
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  egress:
  - toEndpoints:
    - matchLabels:
        app.kubernetes.io/component: database
        app.kubernetes.io/managed-by: kubedb.com
    toPorts:
    - ports:
      # PostgreSQL
      - port: "5432"
        protocol: TCP
      # MongoDB
      - port: "27017"
        protocol: TCP
      # MySQL / MariaDB
      - port: "3306"
        protocol: TCP
      # Redis
      - port: "6379"
        protocol: TCP
      # Elasticsearch / OpenSearch
      - port: "9200"
        protocol: TCP
      # Kafka
      - port: "9092"
        protocol: TCP
      # ClickHouse
      - port: "9000"
        protocol: TCP
      # Cassandra
      - port: "9042"
        protocol: TCP
{{- end }}
