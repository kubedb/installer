{{- if eq "true" ( include "security.useCiliumNetworkPolicy" . ) }}
# Allow every pod in the operator namespace to reach the Kubernetes API server.
# Required when the operator runs with >1 replica (leader election against
# kube-apiserver) or when DBs are reconciled across namespaces.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-egress-kubernetes-api
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector: {}
  egress:
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
---
# Allow every pod in the operator namespace to resolve DNS.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-egress-dns
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
      rules:
        dns:
        - matchPattern: '*'
{{- end }}
