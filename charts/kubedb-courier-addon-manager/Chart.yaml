apiVersion: v2
name: kubedb-courier-addon-manager
description: |
  Hub-side KubeDB Courier addon manager. It installs the kubedb-courier manager
  Deployment, the hub RBAC it needs, and registers the courier Open Cluster
  Management addon so the per-cluster branch operator (kubedb-courier run) rolls
  out to managed clusters. Same-cluster branches do not need this chart; it is
  the cross-cluster (BranchWork over OCM) control plane.
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://kubedb.com
sources:
  - https://github.com/kubedb/courier
maintainers:
  - name: appscode
    email: support@appscode.com
keywords:
  - kubedb
  - courier
  - branch
  - open-cluster-management
