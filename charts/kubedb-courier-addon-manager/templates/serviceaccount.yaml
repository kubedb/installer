apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "courier-addon-manager.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "courier-addon-manager.labels" . | nindent 4 }}
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
