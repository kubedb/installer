apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "courier-addon-manager.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "courier-addon-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.manager.replicaCount }}
  selector:
    matchLabels:
      {{- include "courier-addon-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "courier-addon-manager.selectorLabels" . | nindent 8 }}
      {{- with .Values.manager.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "courier-addon-manager.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: {{ include "courier-addon-manager.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - manager
            - --max-feedback-watch={{ .Values.manager.maxFeedbackWatch }}
            {{- if .Values.manager.leaderElection }}
            - --leader-elect=true
            {{- end }}
            - --agent-image={{ include "courier-addon-manager.agentImage" . }}
            - --agent-install-namespace={{ .Values.agent.installNamespace }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: healthz
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
          resources:
            {{- toYaml .Values.manager.resources | nindent 12 }}
      {{- with .Values.manager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.manager.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
