apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-https-config
  namespace: testing
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - address:
          socket_address:
            address: 0.0.0.0
            port_value: 10000
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              codec_type: AUTO
              stat_prefix: ingress_http
              route_config:
                name: local_route
                virtual_hosts:
                - name: app
                  domains:
                  - "*"
                  routes:
                  - match:
                      prefix: "/"
                    route:
                      cluster: service-https
                      auto_host_rewrite: true
              http_filters:
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          # transport_socket:
          #   name: envoy.transport_sockets.tls
          #   typed_config:
          #     "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
          #     common_tls_context:
          #       tls_certificates:
          #       - certificate_chain: {filename: "client/tls.crt"}
          #         private_key: {filename: "client/tls.key"}
          #       validation_context:
          #         trusted_ca:
          #           filename: client/ca.crt
      clusters:
      - name: service-https
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: service-https
          endpoints:
          - lb_endpoints:
            - endpoint:
                hostname: "tamal-gateway.keda.kubedb.cloud"
                address:
                  socket_address:
                    address: keda-add-ons-http-interceptor-proxy
                    port_value: 8080
        # transport_socket:
        #   name: envoy.transport_sockets.tls
        #   typed_config:
        #     "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        #     common_tls_context:
        #       tls_certificates:
        #       - certificate_chain: {filename: "client/tls.crt"}
        #         private_key: {filename: "client/tls.key"}
        #       # validation_context:
        #       #   trusted_ca:
        #       #     filename: server/ca.crt

    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8001