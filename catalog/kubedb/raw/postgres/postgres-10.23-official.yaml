apiVersion: catalog.kubedb.com/v1alpha1
kind: PostgresVersion
metadata:
  name: "10.23"
spec:
  coordinator:
    image: ghcr.io/kubedb/pg-coordinator:v0.49.0
  db:
    baseOS: alpine
    image: ghcr.io/appscode-images/postgres:10.23-alpine
  distribution: Official
  endOfLife: true
  exporter:
    image: docker.io/prometheuscommunity/postgres-exporter:v0.18.1
  initContainer:
    image: ghcr.io/kubedb/postgres-init:0.19.0
  courier:
    cli:
      image: ghcr.io/kubedb/postgresql-kubedb-migrator:v0.5.0
    statusReporter:
      image: ghcr.io/kubedb/kubedb-courier:v0.5.0
  podSecurityPolicies:
    databasePolicyName: postgres-db
  securityContext:
    runAsAnyNonRoot: false
    runAsUser: 70
  stash:
    addon:
      backupTask:
        name: postgres-backup-10.14
      restoreTask:
        name: postgres-restore-10.14
  ui:
  - name: pgadmin
    version: v2026.3.30
  - name: dbgate
    version: v2026.3.30
  updateConstraints:
    allowlist:
    - '>= 10.23, <= 16.8'
  version: "10.23"

---
