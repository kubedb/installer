apiVersion: catalog.kubedb.com/v1alpha1
kind: PostgresVersion
metadata:
  name: 11-bullseye-postgis
spec:
  archiver:
    addon:
      name: postgres-addon
      tasks:
        fullBackup:
          name: physical-backup
        fullBackupRestore:
          name: physical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        volumeSnapshot:
          name: volume-snapshot
    walg:
      image: ghcr.io/kubedb/postgres-archiver:(v0.26.0)_11.22-bookworm
  coordinator:
    image: ghcr.io/kubedb/pg-coordinator:v0.49.0
  db:
    image: docker.io/postgis/postgis:11-3.3
  distribution: PostGIS
  endOfLife: true
  exporter:
    image: docker.io/prometheuscommunity/postgres-exporter:v0.18.1
  initContainer:
    image: ghcr.io/kubedb/postgres-init:0.19.0
  courier:
    cli:
      image: ghcr.io/kubedb/postgresql-kubedb-migrator:v0.5.0
    statusReporter:
      image: ghcr.io/kubedb/kubedb-courier:v0.5.0
  podSecurityPolicies:
    databasePolicyName: postgres-db
  securityContext:
    runAsAnyNonRoot: true
    runAsUser: 999
  stash:
    addon:
      backupTask:
        name: postgres-backup-11.9
      restoreTask:
        name: postgres-restore-11.9
  ui:
  - name: pgadmin
    version: v2026.3.30
  - name: dbgate
    version: v2026.3.30
  updateConstraints:
    allowlist:
    - '>= 11.22, <= 16.8'
  version: "11.22"
