apiVersion: catalog.kubedb.com/v1alpha1
kind: PostgresVersion
metadata:
  name: "18.3"
spec:
  archiver:
    addon:
      name: postgres-addon
      tasks:
        fullBackup:
          name: physical-backup
        fullBackupRestore:
          name: physical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        volumeSnapshot:
          name: volume-snapshot
    walg:
      image: ghcr.io/kubedb/postgres-archiver:(v0.26.0-rc.1)_18.2-alpine
  coordinator:
    image: ghcr.io/kubedb/pg-coordinator:v0.49.0-rc.1
  db:
    baseOS: alpine
    image: ghcr.io/appscode-images/postgres:18.3-alpine
  distribution: Official
  exporter:
    image: docker.io/prometheuscommunity/postgres-exporter:v0.18.1
  initContainer:
    image: ghcr.io/kubedb/postgres-init:0.19.0
  migrator:
    cli:
      image: ghcr.io/kubedb/migrator-cli:v0.5.0-rc.1
    statusReporter:
      image: ghcr.io/kubedb/migrator-operator:v0.5.0-rc.1
  podSecurityPolicies:
    databasePolicyName: postgres-db
  securityContext:
    runAsAnyNonRoot: false
    runAsUser: 70
  ui:
  - name: pgadmin
    version: v2026.3.30
  - name: dbgate
    version: v2026.3.30
  updateConstraints:
    allowlist:
    - '>= 18.3'
  version: "18.3"

---
