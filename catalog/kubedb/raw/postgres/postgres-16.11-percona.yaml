apiVersion: catalog.kubedb.com/v1alpha1
kind: PostgresVersion
metadata:
  name: 16.11-percona
spec:
  archiver:
    addon:
      name: postgres-addon
      tasks:
        fullBackup:
          name: physical-backup
        fullBackupRestore:
          name: physical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        volumeSnapshot:
          name: volume-snapshot
    walg:
      image: ghcr.io/kubedb/postgres-archiver:(v0.22.0-rc.0)_16.1-bookworm
  coordinator:
    image: ghcr.io/kubedb/pg-coordinator:v0.45.0-rc.0
  db:
    baseOS: bookworm
    image: percona/percona-distribution-postgresql:16.11
  distribution: Percona
  exporter:
    image: prometheuscommunity/postgres-exporter:v0.18.1
  initContainer:
    image: ghcr.io/kubedb/postgres-init:0.18.0
  migrator:
    cli:
      image: ghcr.io/kubedb/migrator-cli:v0.1.0-rc.0
    statusReporter:
      image: ghcr.io/kubedb/migrator-operator:v0.1.0-rc.0
  podSecurityPolicies:
    databasePolicyName: postgres-db
  securityContext:
    runAsAnyNonRoot: true
    runAsUser: 26
  stash:
    addon:
      backupTask:
        name: postgres-backup-16.1
      restoreTask:
        name: postgres-restore-16.1
  tls:
    disableSSLSessionResumption: true
  ui:
  - name: pgadmin
    version: v2024.4.27
  - name: dbgate
    version: v2024.4.27
  updateConstraints:
    allowlist:
    - 17.7-percona
  version: "16.11"
