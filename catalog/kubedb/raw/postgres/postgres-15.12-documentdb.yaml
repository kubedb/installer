apiVersion: catalog.kubedb.com/v1alpha1
kind: PostgresVersion
metadata:
  name: 15.12-documentdb
spec:
  archiver:
    addon:
      name: postgres-addon
      tasks:
        fullBackup:
          name: physical-backup
        fullBackupRestore:
          name: physical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        volumeSnapshot:
          name: volume-snapshot
    walg:
      image: ghcr.io/kubedb/postgres-archiver:(v0.25.0-rc.0)_15.5-bookworm
  coordinator:
    image: ghcr.io/kubedb/pg-coordinator:v0.48.0-rc.0
  db:
    baseOS: bookworm
    image: ghcr.io/appscode-images/postgres-documentdb:15-0.102.0-ferretdb-2.0.0
  distribution: DocumentDB
  exporter:
    image: docker.io/prometheuscommunity/postgres-exporter:v0.18.1
  initContainer:
    image: ghcr.io/kubedb/postgres-init:0.19.0
  migrator:
    cli:
      image: ghcr.io/kubedb/migrator-cli:v0.4.0-rc.0
    statusReporter:
      image: ghcr.io/kubedb/migrator-operator:v0.4.0-rc.0
  podSecurityPolicies:
    databasePolicyName: postgres-db
  securityContext:
    runAsAnyNonRoot: true
    runAsUser: 999
  stash:
    addon:
      backupTask:
        name: postgres-backup-15.1
      restoreTask:
        name: postgres-restore-15.1
  ui:
  - name: pgadmin
    version: v2026.3.30
  - name: dbgate
    version: v2026.3.30
  updateConstraints:
    allowlist:
    - '>= 15.12'
  version: "15.12"
