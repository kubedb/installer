apiVersion: catalog.kubedb.com/v1alpha1
kind: PostgresVersion
metadata:
  name: "14.15"
spec:
  archiver:
    addon:
      name: postgres-addon
      tasks:
        fullBackup:
          name: physical-backup
        fullBackupRestore:
          name: physical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        volumeSnapshot:
          name: volume-snapshot
    walg:
      image: ghcr.io/kubedb/postgres-archiver:(v0.26.0)_14.10-alpine
  coordinator:
    image: ghcr.io/kubedb/pg-coordinator:v0.49.0
  db:
    baseOS: alpine
    image: ghcr.io/appscode-images/postgres:14.15-alpine
  distribution: Official
  exporter:
    image: docker.io/prometheuscommunity/postgres-exporter:v0.18.1
  initContainer:
    image: ghcr.io/kubedb/postgres-init:0.19.0
  courier:
    cli:
      image: ghcr.io/kubedb/postgresql-kubedb-migrator:v0.5.0
    statusReporter:
      image: ghcr.io/kubedb/kubedb-courier:v0.5.0
  podSecurityPolicies:
    databasePolicyName: postgres-db
  securityContext:
    runAsAnyNonRoot: false
    runAsUser: 70
  stash:
    addon:
      backupTask:
        name: postgres-backup-14.0
      restoreTask:
        name: postgres-restore-14.0
  ui:
  - name: pgadmin
    version: v2026.3.30
  - name: dbgate
    version: v2026.3.30
  updateConstraints:
    allowlist:
    - '>= 14.15'
  version: "14.15"

