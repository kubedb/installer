apiVersion: catalog.kubedb.com/v1alpha1
kind: PostgresVersion
metadata:
  name: 16.2-bullseye-postgis
spec:
  archiver:
    addon:
      name: postgres-addon
      tasks:
        fullBackup:
          name: physical-backup
        fullBackupRestore:
          name: physical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        volumeSnapshot:
          name: volume-snapshot
    walg:
      image: ghcr.io/kubedb/postgres-archiver:(v0.26.0)_16.1-bookworm
  coordinator:
    image: ghcr.io/kubedb/pg-coordinator:v0.49.0
  db:
    baseOS: bullseye
    image: docker.io/postgis/postgis:16-3.4
  distribution: PostGIS
  exporter:
    image: docker.io/prometheuscommunity/postgres-exporter:v0.18.1
  initContainer:
    image: ghcr.io/kubedb/postgres-init:0.19.0
  courier:
    cli:
      image: ghcr.io/kubedb/postgresql-courier-cli:v0.5.0
    statusReporter:
      image: ghcr.io/kubedb/courier-operator:v0.5.0
  podSecurityPolicies:
    databasePolicyName: postgres-db
  securityContext:
    runAsAnyNonRoot: true
    runAsUser: 999
  stash:
    addon:
      backupTask:
        name: postgres-backup-16.1
      restoreTask:
        name: postgres-restore-16.1
  ui:
  - name: pgadmin
    version: v2026.3.30
  - name: dbgate
    version: v2026.3.30
  updateConstraints:
    allowlist:
    - '>= 16.2'
  version: "16.2"
