apiVersion: catalog.kubedb.com/v1alpha1
kind: HazelcastVersion
metadata:
  name: 5.5.2
spec:
  version: "5.5.2"
  db:
    image: "hazelcast/hazelcast-enterprise:5.5.2"
  initContainer:
    image: "pritam99/hz-init:v7"
  securityContext:
    runAsAnyNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
  podSecurityPolicies:
    databasePolicyName: hazelcast-db

