apiVersion: catalog.kubedb.com/v1alpha1
kind: ClickHouseVersion
metadata:
  name: 25.7.1
spec:
  archiver:
    addon:
      name: clickhouse-addon
      tasks:
        fullBackup:
          name: logical-backup
        fullBackupRestore:
          name: logical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        incBackupRestore:
          name: incremental-restore
    walg:
      image: ghcr.io/shuvokumarmondal/clickhouse-backup-plugin:v9.2_linux_amd64
  clickHouseKeeper:
    image: docker.io/clickhouse/clickhouse-keeper:25.7.1
  db:
    image: docker.io/clickhouse/clickhouse-server:25.7.1
  gitSyncer:
    image: registry.k8s.io/git-sync/git-sync:v4.4.2
  initContainer:
    image: ghcr.io/kubedb/clickhouse-init:24.4.1-v3
  securityContext:
    runAsUser: 101
  updateConstraints:
    allowlist:
    - '>= 25.7.1'
  version: 25.7.1
