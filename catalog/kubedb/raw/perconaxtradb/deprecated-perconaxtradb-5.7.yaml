apiVersion: catalog.kubedb.com/v1alpha1
kind: PerconaXtraDBVersion
metadata:
  name: "5.7"
spec:
  coordinator:
    image: ghcr.io/kubedb/percona-xtradb-coordinator:v0.38.0
  db:
    image: ghcr.io/kubedb/percona:5.7
  deprecated: true
  exporter:
    image: ghcr.io/kubedb/mysqld-exporter:v0.11.0
  gitSyncer:
    image: registry.k8s.io/git-sync/git-sync:v4.4.2
  initContainer:
    image: ghcr.io/kubedb/busybox
  podSecurityPolicies:
    databasePolicyName: percona-xtradb-db
  securityContext:
    runAsUser: 1001
  stash:
    addon:
      backupTask:
        name: perconaxtradb-backup-5.7
      restoreTask:
        name: perconaxtradb-restore-5.7
  version: "5.7"

