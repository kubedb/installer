apiVersion: catalog.kubedb.com/v1alpha1
kind: PerconaXtraDBVersion
metadata:
  name: 8.0.40
spec:
  coordinator:
    image: ghcr.io/kubedb/percona-xtradb-coordinator:v0.39.0
  db:
    image: ghcr.io/appscode-images/percona-xtradb-cluster:8.0.40
  exporter:
    image: docker.io/prom/mysqld-exporter:v0.18.0
  gitSyncer:
    image: registry.k8s.io/git-sync/git-sync:v4.4.2
  initContainer:
    image: ghcr.io/kubedb/percona-xtradb-init:0.2.3
  podSecurityPolicies:
    databasePolicyName: percona-xtradb-db
  securityContext:
    runAsUser: 1001
  stash:
    addon:
      backupTask:
        name: perconaxtradb-backup-8.0
      restoreTask:
        name: perconaxtradb-restore-8.0
  updateConstraints:
    allowlist:
    - '>= 8.0.40, <= 8.4.3'
  version: 8.0.40
