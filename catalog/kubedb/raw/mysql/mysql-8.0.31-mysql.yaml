apiVersion: catalog.kubedb.com/v1alpha1
kind: MySQLVersion
metadata:
  name: 8.0.31-innodb
spec:
  archiver:
    addon:
      name: mysql-addon
      tasks:
        fullBackup:
          name: physical-backup
        fullBackupRestore:
          name: physical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        volumeSnapshot:
          name: volume-snapshot
    walg:
      image: ghcr.io/kubedb/mysql-archiver:(v0.26.0)_8.0.35
  coordinator:
    image: ghcr.io/kubedb/mysql-coordinator:v0.43.0
  db:
    image: ghcr.io/appscode-images/mysql:8.0.31-oracle
  distribution: MySQL
  endOfLife: true
  exporter:
    image: ghcr.io/kubedb/mysqld-exporter:v0.18.0
  gitSyncer:
    image: registry.k8s.io/git-sync/git-sync:v4.4.2
  initContainer:
    image: ghcr.io/kubedb/mysql-init:0.1.0
  migrator:
    cli:
      image: ghcr.io/kubedb/mysql-courier-cli:v0.5.0
    statusReporter:
      image: ghcr.io/kubedb/courier-operator:v0.5.0
  podSecurityPolicies:
    databasePolicyName: mysql-db
  replicationModeDetector:
    image: ghcr.io/kubedb/replication-mode-detector:v0.52.0
  router:
    image: ghcr.io/appscode-images/mysql-router:8.0.45
  routerInitContainer:
    image: ghcr.io/kubedb/mysql-router-init:v0.43.0
  securityContext:
    runAsUser: 999
  stash:
    addon:
      backupTask:
        name: mysql-backup-8.0.21
      restoreTask:
        name: mysql-restore-8.0.21
  ui:
  - name: phpmyadmin
    version: v2026.3.30
  updateConstraints:
    allowlist:
      groupReplication:
      - '>= 8.0.31, <= 8.0.31'
      standalone:
      - '>= 8.0.31, <= 8.0.31'
    denylist:
      groupReplication:
      - < 8.0.31
      standalone:
      - < 8.0.31
  version: 8.0.31
