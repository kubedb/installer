apiVersion: catalog.kubedb.com/v1alpha1
kind: MongoDBVersion
metadata:
  name: 4.4.26
spec:
  archiver:
    addon:
      name: mongodb-addon
      tasks:
        fullBackup:
          name: logical-backup
        fullBackupRestore:
          name: logical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        volumeSnapshot:
          name: volume-snapshot
    walg:
      image: ghcr.io/kubedb/wal-g:v2026.3.30_mongo
  db:
    image: ghcr.io/appscode-images/mongo:4.4.26
  distribution: Official
  endOfLife: true
  exporter:
    image: ghcr.io/kubedb/mongodb_exporter:v0.47.2
  gitSyncer:
    image: registry.k8s.io/git-sync/git-sync:v4.4.2
  initContainer:
    image: ghcr.io/kubedb/mongodb-init:4.2-v9
  courier:
    cli:
      image: ghcr.io/kubedb/mongodb-migration-cli:v0.5.0
    statusReporter:
      image: ghcr.io/kubedb/courier-operator:v0.5.0
  podSecurityPolicies:
    databasePolicyName: mongodb-db
  replicationModeDetector:
    image: ghcr.io/kubedb/replication-mode-detector:v0.52.0
  securityContext:
    runAsGroup: 999
    runAsUser: 999
  stash:
    addon:
      backupTask:
        name: mongodb-backup-4.4.6
      restoreTask:
        name: mongodb-restore-4.4.6
  ui:
  - name: mongo-ui
    version: v2026.3.30
  updateConstraints:
    allowlist:
    - '>= 4.4.26, < 6.0.0'
  version: 4.4.26
