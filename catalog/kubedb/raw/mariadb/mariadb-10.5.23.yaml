apiVersion: catalog.kubedb.com/v1alpha1
kind: MariaDBVersion
metadata:
  name: 10.5.23
spec:
  archiver:
    addon:
      name: mariadb-addon
      tasks:
        fullBackup:
          name: physical-backup
        fullBackupRestore:
          name: physical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        volumeSnapshot:
          name: volume-snapshot
    walg:
      image: ghcr.io/kubedb/mariadb-archiver:(v0.25.0)_10.5.23-focal
  coordinator:
    image: ghcr.io/kubedb/mariadb-coordinator:v0.45.0
  db:
    image: ghcr.io/appscode-images/mariadb:10.5.23-focal
  endOfLife: true
  exporter:
    image: docker.io/prom/mysqld-exporter:v0.18.0
  gitSyncer:
    image: registry.k8s.io/git-sync/git-sync:v4.4.2
  initContainer:
    image: ghcr.io/kubedb/mariadb-init:0.9.0
  maxscale:
    image: docker.io/mariadb/maxscale:24.02.4
    securityContext:
      runAsUser: 997
  migrator:
    cli:
      image: ghcr.io/kubedb/mariadb-migrator-cli:v0.5.0
    statusReporter:
      image: ghcr.io/kubedb/migrator-operator:v0.5.0
  podSecurityPolicies:
    databasePolicyName: maria-db
  securityContext:
    runAsUser: 999
  stash:
    addon:
      backupTask:
        name: mariadb-backup-10.6.23
      restoreTask:
        name: mariadb-restore-10.6.23
  ui:
  - name: phpmyadmin
    version: v2026.3.30
  updateConstraints:
    allowlist:
    - '>= 10.5.23, <= 12.1.2'
  version: 10.5.23
