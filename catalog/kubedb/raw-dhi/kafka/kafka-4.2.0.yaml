apiVersion: catalog.kubedb.com/v1alpha1
kind: KafkaVersion
metadata:
  name: 4.2.0
spec:
  connectCluster:
    image: ghcr.io/appscode-images/kafka-connect-cluster:4.2.0
  cruiseControl:
    image: ghcr.io/appscode-images/kafka-cruise-control:4.2.0
  db:
    image: dhi.io/kafka:4.2
  endOfLife: true
  initContainer:
    image: ghcr.io/kubedb/kafka-init:4.0-v2
  podSecurityPolicies:
    databasePolicyName: kafka-db
  securityContext:
    runAsUser: 1001
  ui:
  - name: kafka-ui
    version: v2026.3.30
  updateConstraints:
    allowlist:
    - '>= 4.2.0'
    denylist:
    - < 4.2.0
  version: 4.2.0
