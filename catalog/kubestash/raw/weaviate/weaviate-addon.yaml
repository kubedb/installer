apiVersion: addons.kubestash.com/v1alpha1
kind: Addon
metadata:
  name: weaviate-addon
spec:
  backupTasks:
    - name: logical-backup
      function: weaviate-backup
      driver: Weaviate
      executor: Job
      singleton: true
      parameters:
#        - name: classes
#          usage: List of classes to backup.
#          required: false
        - name: copyOnly
          usage: Backup with COPY_ONLY option (kept for compatibility, may not apply).
          required: false
          default: "true"
      volumeTemplate:
        - name: kubestash-tmp-volume
          usage: Holds temporary files and weaviate cache.
          source:
            emptyDir: {}
      volumeMounts:
        - name: kubestash-tmp-volume
          mountPath: /kubestash-tmp
