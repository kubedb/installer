#          source:
#            emptyDir: {}
#      volumeMounts:
#        - name: kubestash-tmp-volume
#          mountPath: /kubestash-tmp
  restoreTasks:
    - name: logical-backup-restore
      function: weaviate-restore
      driver: Weaviate
      executor: Job
      singleton: true
      parameters:
#        - name: classes
#          usage: List of classes to restore.
#          required: false
        - name: noRecovery
          usage: Restore with NO_RECOVERY option
          required: false
          default: "false"
      volumeTemplate:
        - name: kubestash-tmp-volume
          usage: Holds temporary files and weaviate cache.
          source:
            emptyDir: {}
      volumeMounts:
        - name: kubestash-tmp-volume
          mountPath: /kubestash-tmp
