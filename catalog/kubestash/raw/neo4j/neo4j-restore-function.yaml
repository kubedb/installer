apiVersion: addons.kubestash.com/v1alpha1
kind: Function
metadata:
  name: neo4j-restore
spec:
  args:
    - restore
    - --namespace=${namespace:=default}
    - --restoresession=${restoreSession:=}
    - --wait-timeout=${waitTimeout:=300}
    - --snapshot=${snapshot:=}
    - --databases=${databases:=}
    - --seed-server-name=${seedServerName:=}
  image: ghcr.io/kubedb/neo4j-backup-plugin:v0.1.0