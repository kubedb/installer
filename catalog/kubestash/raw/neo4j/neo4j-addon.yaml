apiVersion: addons.kubestash.com/v1alpha1
kind: Addon
metadata:
  name: neo4j-addon
spec:
  backupTasks:
    - driver: Neo4jAdmin
      executor: Job
      function: neo4j-backup
      name: logical-backup
      parameters:
        - name: databases
          required: false
          usage: List of databases to backup. If not specified, all databases will be backed up.
        - name: neo4jAdminArgs
          required: false
          usage: Arguments to be passed to the neo4j-admin backup command, separate by space.
          default: "--compress=true,--expand-commands,--remote-address-resolution=true,--type=FULL"
        - default: system
          name: excludeDatabases
          required: false
          usage: Comma-separated Neo4j database names to skip during backup
        - name: from
          required: false
          usage: Source Database DNS, from where the backup will take
      singleton: true
      volumeMounts:
        - mountPath: /kubestash-tmp
          name: kubestash-tmp-volume
      volumeTemplate:
        - name: kubestash-tmp-volume
          source:
            emptyDir: {}
          usage: Holds temporary files and cache.
  restoreTasks:
    - driver: Neo4jAdmin
      executor: Job
      function: neo4j-restore
      name: logical-backup-restore
      parameters:
        - name: neo4jAdminArgs
          required: false
          usage: Arguments to be passed to the neo4j-admin restore command, separate by space.
          default: "--overwrite-destination=true,--expand-commands"
        - name: databases
          required: false
          usage: List of databases to restore. If not specified, all databases will be restore.
          default: "*"
        - default: system,neo4j
          name: excludeDatabases
          required: false
          usage: Comma-separated Neo4j database names to skip during restore
        - name: waitTimeout
          required: false
          usage: Seconds to wait for DB ready.
          default: "300"
        - name: seedServerName
          required: false
          usage: Name of the seed server to restore from. If not specified, the restore will be done from the primary server.
      singleton: true
      volumeMounts:
        - mountPath: /kubestash-tmp
          name: kubestash-tmp-volume
      volumeTemplate:
        - name: kubestash-tmp-volume
          source:
            emptyDir: {}
          usage: Holds temporary files and cache.