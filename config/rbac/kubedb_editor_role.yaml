# This rule is not used by the project installer itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the installer.kubedb.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: installer
    app.kubernetes.io/managed-by: kustomize
  name: kubedb-editor-role
rules:
- apiGroups:
  - installer.kubedb.com
  resources:
  - kubedbs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - installer.kubedb.com
  resources:
  - kubedbs/status
  verbs:
  - get
