---
# Source: kubedb/charts/kubedb-provisioner/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubedb-kubedb-provisioner
  namespace: kubedb
  labels:
    helm.sh/chart: kubedb-provisioner-v0.51.0
    app.kubernetes.io/name: kubedb-provisioner
    app.kubernetes.io/instance: kubedb
    app.kubernetes.io/version: "v0.51.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubedb-provisioner
      app.kubernetes.io/instance: kubedb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubedb-provisioner
        app.kubernetes.io/instance: kubedb
      annotations:
        reload: zvgpMaEX
    spec:
      imagePullSecrets:
        []
      serviceAccountName: kubedb-kubedb-provisioner
      initContainers:
      - name: wait
        image: ghcr.io/appscode/kubectl-nonroot:1.31
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - kubectl wait --for=create -n kubedb service -l 'app.kubernetes.io/name=kubedb-webhook-server' --timeout=5m &&
          kubectl wait --for=condition=kubedb.com/conversion=true -n kubedb pods -l 'app.kubernetes.io/instance=kubedb,app.kubernetes.io/name=kubedb-webhook-server' --timeout=5m
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault
        resources:
          {}
      containers:
      - name: operator
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          seccompProfile:
            type: RuntimeDefault
        image: ghcr.io/kubedb/kubedb-provisioner:v0.51.0
        imagePullPolicy: IfNotPresent
        args:
        - operator
        - --v=3
        - --use-kubeapiserver-fqdn-for-aks=true
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        
        
        - --license-file=/var/run/secrets/appscode/license/key.txt
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_SERVICE_ACCOUNT
          valueFrom:
            fieldRef:
              fieldPath: spec.serviceAccountName
        ports:
        - name: metrics
          containerPort: 8080
        - name: probes
          containerPort: 8081
        volumeMounts:
        - mountPath: /tmp
          name: tmpdir
        - mountPath: /var/run/secrets/appscode/license
          name: license
        readinessProbe:
          httpGet:
            path: /readyz
            port: probes
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: probes
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          {}
      volumes:
      - name: tmpdir
        emptyDir: {}
      - name: license
        secret:
          defaultMode: 420
          secretName: kubedb-kubedb-provisioner-license
      securityContext:
        {}
      nodeSelector:
        kubernetes.io/os: linux
