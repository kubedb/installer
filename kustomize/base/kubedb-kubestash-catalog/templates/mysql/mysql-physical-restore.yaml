---
# Source: kubedb/charts/kubedb-kubestash-catalog/templates/mysql/mysql-physical-restore.yaml
apiVersion: addons.kubestash.com/v1alpha1
kind: Function
metadata:
  name: 'mysql-physical-restore'
  labels:
    helm.sh/chart: kubedb-kubestash-catalog-v2025.1.9
    app.kubernetes.io/name: kubedb-kubestash-catalog
    app.kubernetes.io/instance: kubedb
    app.kubernetes.io/version: "v2025.1.9"
    app.kubernetes.io/managed-by: Helm
spec:
  args:
  - restore
  - --namespace=${namespace:=default}
  - --restoresession=${restoreSession:=}
  - --snapshot=${snapshot:=}
  - --enable-cache=${enableCache:=}
  - --scratch-dir=${scratchDir:=}
  - --wait-timeout=${waitTimeout:=300}
  - --mysql-args=${args:=}
  - --data-dir=${dataDir:=}
  availableVersions:
  - 2.4.29
  - 8.0.35
  - 8.1.0
  - 8.2.0
  - 8.4.0
  image: 'ghcr.io/kubedb/xtrabackup-restic-plugin:v0.1.0_${DB_VERSION}'
