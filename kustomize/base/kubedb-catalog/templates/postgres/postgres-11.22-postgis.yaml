---
# Source: kubedb/charts/kubedb-catalog/templates/postgres/postgres-11.22-postgis.yaml
apiVersion: catalog.kubedb.com/v1alpha1
kind: PostgresVersion
metadata:
  name: '11-bullseye-postgis'
  labels:
    helm.sh/chart: kubedb-catalog-v2025.1.9
    app.kubernetes.io/name: kubedb-catalog
    app.kubernetes.io/instance: kubedb
    app.kubernetes.io/version: "v2025.1.9"
    app.kubernetes.io/managed-by: Helm
spec:
  archiver:
    addon:
      name: postgres-addon
      tasks:
        fullBackup:
          name: physical-backup
        fullBackupRestore:
          name: physical-backup-restore
        manifestBackup:
          name: manifest-backup
        manifestRestore:
          name: manifest-restore
        volumeSnapshot:
          name: volume-snapshot
    walg:
      image: 'ghcr.io/kubedb/postgres-archiver:v0.12.0_11.22-bookworm'
  coordinator:
    image: 'ghcr.io/kubedb/pg-coordinator:v0.35.0'
  db:
    image: 'postgis/postgis:11-3.3'
  distribution: PostGIS
  exporter:
    image: 'prometheuscommunity/postgres-exporter:v0.15.0'
  initContainer:
    image: 'ghcr.io/kubedb/postgres-init:0.17.1'
  podSecurityPolicies:
    databasePolicyName: postgres-db
  securityContext:
    runAsAnyNonRoot: true
    runAsUser: 999
  stash:
    addon:
      backupTask:
        name: postgres-backup-11.9
      restoreTask:
        name: postgres-restore-11.9
  ui:
  - name: pgadmin
    version: v2024.4.27
  - name: dbgate
    version: v2024.4.27
  updateConstraints:
    allowlist:
    - '>= 11.22, <= 16.6'
  version: "11.22"
