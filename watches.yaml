# Use the 'create api' subcommand to add watches to this file.
- group: installer.kubedb.com
  version: v1
  kind: Kubedb
  chart: helm-charts/kubedb
  watchDependentResources: false
  dryRunOption: server
  overrideValues:
    kubedb-webhook-server.apiserver.servingCerts.certManager.enabled: true
    operator-shard-manager.apiserver.servingCerts.certManager.enabled: true
    petset.apiserver.servingCerts.certManager.enabled: true
    sidekick.apiserver.servingCerts.certManager.enabled: true
    supervisor.apiserver.servingCerts.certManager.enabled: true
# +kubebuilder:scaffold:watch
